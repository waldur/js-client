name: Publish NPM package

on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths:
      - 'src/**'
  # Allow re-publishing manually (e.g. after a publish failure) without needing
  # a fresh SDK push, since the push trigger is gated on src/** changes.
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

# Serialize publish runs so each version-bump commit is pushed onto an
# up-to-date main. Without this, two runs (or a concurrent push to the same
# ref) can advance main between checkout and push, producing a non-fast-forward
# "Updates were rejected ... (fetch first)" error. cancel-in-progress: false so
# queued runs still publish rather than being dropped.
concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org/

      # No `npm install -g npm@latest` self-upgrade: node 24 already bundles
      # npm >= 11.5.1 (node 24.18.0 ships npm 11.16.0), and the global
      # self-upgrade drops npm's bundled `sigstore` module, which broke
      # `npm publish` provenance with "Cannot find module 'sigstore'".

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'

      - name: Publish package
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            npm publish
          else
            npm version prerelease --preid=dev
            # Push the version-bump commit, rebasing and retrying if main
            # advanced meanwhile (e.g. a concurrent SDK-regen push to src/**).
            # A bare `git push` fails with a non-fast-forward rejection in that
            # case and aborts the whole publish.
            attempts=0
            until git push origin HEAD:main; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge 5 ]; then
                echo "::error::Failed to push version bump after $attempts attempts"
                exit 1
              fi
              echo "Push rejected (attempt $attempts); rebasing onto origin/main and retrying..."
              git pull --rebase origin main
              sleep $((RANDOM % 5 + 2))
            done
            npm publish --tag dev
          fi

      - name: Deprecate old dev versions
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DEPRECATE_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_DEPRECATE_TOKEN secret not set, skipping deprecation"
            exit 0
          fi
          node -e "
            const { execSync } = require('child_process');
            const versions = JSON.parse(execSync('npm view waldur-js-client versions --json').toString());
            const devVersions = versions.filter(v => v.includes('-dev.'));
            const toDeprecate = devVersions.slice(0, -6);
            for (const v of toDeprecate) {
              console.log('Deprecating ' + v);
              execSync('npm deprecate waldur-js-client@' + v + ' \"Outdated dev version. Use the dev tag for the latest dev release.\"');
            }
            console.log('Deprecated ' + toDeprecate.length + ' old dev versions, keeping ' + Math.min(devVersions.length, 6) + ' recent ones.');
          "
