name: Modularize SDK

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  modularize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run split script
        run: npx tsx scripts/split-sdk.ts
        env:
          SDK_SRC: src
          SDK_OUT: modular-sdk

      - name: Push to js-client-modular
        run: |
          git clone https://x-access-token:${{ secrets.MODULAR_SDK_TOKEN }}@github.com/waldur/js-client-modular.git target
          # Clear target repo except .git
          find target -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +
          # Move modular-sdk contents to target
          cp -r modular-sdk/* target/
          cd target
          git config user.name 'GitHub Actions'
          git config user.email 'github-actions@github.com'
          git add .
          git commit -m "chore: sync with monolith [${{ github.sha }}]" || exit 0
          git push origin main
