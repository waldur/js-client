include:
  - project: "waldur/waldur-pipelines"
    file: "/templates/utils/release-utils.yml"

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

stages:
  - test
  - release
  - publish

Build TypeScript SDK:
  stage: test
  image: registry.hpc.ut.ee/mirror/library/node:lts-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
  needs: []
  before_script:
    - |
      apk add --no-cache curl jq
      fetch_schema() {
        local filename="$1"
        
        download_with_token() {
          local token_header="$1"
          local token_val="$2"
          
          # 1. Try direct API download by ref (simplest, uses latest successful pipeline)
          echo "Attempting direct API download by ref $MASTERMIND_REF..."
          if curl --fail --show-error --silent -L --header "${token_header}: ${token_val}" \
            "https://code.opennodecloud.com/api/v4/projects/waldur%2Fwaldur-mastermind/jobs/artifacts/$MASTERMIND_REF/raw/${filename}?job=Generate%20OpenAPI%20schema" -o "${filename}"; then
            echo "Successfully fetched ${filename} using direct API ref download."
            return 0
          fi
          
          # 2. Try direct Web URL download by ref (works with repo-only tokens)
          echo "Direct API download failed. Attempting web URL download by ref $MASTERMIND_REF..."
          if curl --fail --show-error --silent -L --header "${token_header}: ${token_val}" \
            "https://code.opennodecloud.com/waldur/waldur-mastermind/-/jobs/artifacts/$MASTERMIND_REF/raw/${filename}?job=Generate%20OpenAPI%20schema" -o "${filename}"; then
            echo "Successfully fetched ${filename} using web URL ref download."
            return 0
          fi
          
          # 3. Fallback: Query pipelines to find the latest successful job on the ref
          echo "Direct download options failed. Querying pipelines for ref $MASTERMIND_REF..."
          local pipelines_url="https://code.opennodecloud.com/api/v4/projects/waldur%2Fwaldur-mastermind/pipelines?ref=$MASTERMIND_REF"
          local pipelines_json
          pipelines_json=$(curl --fail --silent --header "${token_header}: ${token_val}" "$pipelines_url" 2>/dev/null)
          
          if [ -n "$pipelines_json" ] && [ "$pipelines_json" != "[]" ]; then
            local pipeline_ids
            pipeline_ids=$(echo "$pipelines_json" | jq -r '.[0:5][].id' 2>/dev/null)
            for pipeline_id in $pipeline_ids; do
              if [ -n "$pipeline_id" ] && [ "$pipeline_id" != "null" ]; then
                echo "Checking pipeline ID: $pipeline_id for successful Generate OpenAPI schema job..."
                local jobs_url="https://code.opennodecloud.com/api/v4/projects/waldur%2Fwaldur-mastermind/pipelines/${pipeline_id}/jobs"
                local jobs_json
                jobs_json=$(curl --fail --silent --header "${token_header}: ${token_val}" "$jobs_url" 2>/dev/null)
                if [ -n "$jobs_json" ]; then
                  local job_id
                  job_id=$(echo "$jobs_json" | jq -r '.[] | select(.name == "Generate OpenAPI schema" and .status == "success") | .id' 2>/dev/null)
                  if [ -n "$job_id" ] && [ "$job_id" != "null" ]; then
                    echo "Found job ID: $job_id in pipeline $pipeline_id. Downloading artifact..."
                    if curl --fail --show-error --silent -L --header "${token_header}: ${token_val}" \
                      "https://code.opennodecloud.com/api/v4/projects/waldur%2Fwaldur-mastermind/jobs/${job_id}/artifacts/raw/${filename}" -o "${filename}"; then
                      echo "Successfully fetched ${filename} using job ID."
                      return 0
                    fi
                  fi
                fi
              fi
            done
          fi
          return 1
        }

        if download_with_token "JOB-TOKEN" "$CI_JOB_TOKEN"; then
          return 0
        else
          echo "JOB-TOKEN download failed, trying GITLAB_TOKEN..."
          if download_with_token "PRIVATE-TOKEN" "$GITLAB_TOKEN"; then
            return 0
          else
            echo "ERROR: Failed to fetch ${filename}"
            return 1
          fi
        fi
      }
      fetch_schema waldur-typescript-schema.yaml
  script:
    - bash scripts/generate-ts-sdk.sh
  artifacts:
    paths:
      - src/
      - package.json
      - package-lock.json
    expire_in: 1 day

Release TypeScript/JavaScript SDK:
  stage: release
  image: registry.hpc.ut.ee/mirror/library/node:lts-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
  needs:
    - job: Build TypeScript SDK
      artifacts: true
  before_script:
    - apk add --no-cache bash git
    - git config --global user.name "$GITLAB_USER_NAME"
    - git config --global user.email "$GITLAB_USER_EMAIL"
    # Authenticate origin with token for pushing back commits & tags
    - git remote set-url origin "https://gitlab-ci-token:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    # src/ is passed from the Test TypeScript SDK job automatically
    - |
      git add src package.json package-lock.json
      if [ -n "$RELEASE_VERSION" ]; then
        git diff --cached --quiet && echo "js-client version already set" || git commit -m "Release: bump version and update code to $RELEASE_VERSION"
        git tag -a $RELEASE_VERSION -m "Release version $RELEASE_VERSION" || echo "Tag $RELEASE_VERSION already exists"
        git push origin $RELEASE_VERSION || echo "Tag $RELEASE_VERSION already pushed"
      else
        DEV_VERSION=$(node -p "require('./package.json').version")
        git diff --cached --quiet && echo "No changes" || git commit -m "chore: nightly update of Waldur TypeScript SDK to $DEV_VERSION"
      fi
    - git pull --rebase origin main && git push origin HEAD:main || echo "main already up to date in js-client"

Publish Dev to NPM:
  stage: publish
  image: registry.hpc.ut.ee/mirror/library/node:lts-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline" && $RELEASE_VERSION == ""'
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $RELEASE_VERSION == ""'
  needs:
    - job: Build TypeScript SDK
  before_script:
    - apk add --no-cache bash git
  script:
    - set -e
    - |
      git fetch origin main
      git checkout main
      npm install
      npm run build
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      npm publish --tag dev
    # Deprecate old dev versions
    - |
      if [ -n "${NPM_DEPRECATE_TOKEN:-$NPM_TOKEN}" ]; then
        echo "//registry.npmjs.org/:_authToken=${NPM_DEPRECATE_TOKEN:-$NPM_TOKEN}" > ~/.npmrc
        node -e '
          const { execSync } = require("child_process");
          const versions = JSON.parse(execSync("npm view waldur-js-client versions --json").toString());
          const devVersions = versions.filter(v => v.includes("-dev."));
          const toDeprecate = devVersions.slice(0, -6);
          for (const v of toDeprecate) {
            console.log("Deprecating " + v);
            execSync("npm deprecate waldur-js-client@" + v + " \"Outdated dev version. Use the dev tag for the latest dev release.\"");
          }
          console.log("Deprecated " + toDeprecate.length + " old dev versions, keeping " + Math.min(devVersions.length, 6) + " recent ones.");
        '
      fi

Publish Release to NPM:
  stage: publish
  image: registry.hpc.ut.ee/mirror/library/node:lts-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline" && $RELEASE_VERSION =~ /^\d+\.\d+\.\d+$/'
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $RELEASE_VERSION =~ /^\d+\.\d+\.\d+$/'
  needs:
    - job: Build TypeScript SDK
      artifacts: true
  before_script:
    - apk add --no-cache bash git
  script:
    - set -e
    - npm version "$RELEASE_VERSION" --no-git-tag-version
    - npm install
    - npm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - npm publish
