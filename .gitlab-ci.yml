include:
  - project: "waldur/waldur-pipelines"
    file: "/templates/utils/release-utils.yml"

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

stages:
  - codegen
  - release
  - publish

Build TypeScript SDK:
  stage: codegen
  image: registry.hpc.ut.ee/mirror/library/node:lts-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
  variables:
    # URL-encoded path of the waldur-docs project
    DOCS_PROJECT: "waldur%2Fwaldur-docs"
    DOCS_JOB_NAME: "Generate OpenAPI schema"
  before_script:
    - apk add --no-cache bash curl jq yq unzip

    # 1. Query the parent pipeline's jobs list to find the successful "Generate OpenAPI schema" job ID
    - |
      echo "Fetching job list for parent pipeline: ${PARENT_PIPELINE_ID}..."
      JOBS_JSON=$(curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${DOCS_PROJECT}/pipelines/${PARENT_PIPELINE_ID}/jobs?scope=success")
      
    # 2. Extract the job ID using jq
    - |
      JOB_ID=$(echo "$JOBS_JSON" | jq -r ".[] | select(.name == \"${DOCS_JOB_NAME}\") | .id" | head -n 1)
      if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
        echo "Error: Could not find job ID for '${DOCS_JOB_NAME}' in parent pipeline!"
        exit 1
      fi
      echo "Found target Job ID: ${JOB_ID}"

    # 3. Download the zipped artifacts of that specific job ID
    - |
      curl --location --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --output docs_artifacts.zip \
        "${CI_API_V4_URL}/projects/${DOCS_PROJECT}/jobs/${JOB_ID}/artifacts"

    # 4. Extract and use the schema
    - |
      unzip -o docs_artifacts.zip
  script:
    - bash scripts/generate-ts-sdk.sh
  artifacts:
    paths:
      - src/
      - package.json
      - package-lock.json
    expire_in: 1 day

Release TypeScript/JavaScript SDK:
  stage: release
  image: registry.hpc.ut.ee/mirror/library/node:lts-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
  needs:
    - job: Build TypeScript SDK
      artifacts: true
  before_script:
    - apk add --no-cache bash git
    - git config --global user.name "$GITLAB_USER_NAME"
    - git config --global user.email "$GITLAB_USER_EMAIL"
    # Authenticate origin with token for pushing back commits & tags
    - git remote set-url origin "https://gitlab-ci-token:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    # src/ is passed from the Test TypeScript SDK job automatically
    - |
      git add src package.json package-lock.json
      if [ -n "$RELEASE_VERSION" ]; then
        git diff --cached --quiet && echo "js-client version already set" || git commit -m "Release: bump version and update code to $RELEASE_VERSION"
        git tag -a $RELEASE_VERSION -m "Release version $RELEASE_VERSION" || echo "Tag $RELEASE_VERSION already exists"
        git push origin $RELEASE_VERSION || echo "Tag $RELEASE_VERSION already pushed"
      else
        DEV_VERSION=$(node -p "require('./package.json').version")
        git diff --cached --quiet && echo "No changes" || git commit -m "chore: nightly update of Waldur TypeScript SDK to $DEV_VERSION"
      fi
    - git pull --rebase origin main && git push origin HEAD:main || echo "main already up to date in js-client"

Publish Dev to NPM:
  stage: publish
  image: registry.hpc.ut.ee/mirror/library/node:lts-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline" && $RELEASE_VERSION == ""'
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $RELEASE_VERSION == ""'
  needs:
    - job: Build TypeScript SDK
  before_script:
    - apk add --no-cache bash git
  script:
    - set -e
    - |
      git fetch origin main
      git checkout main
      npm install
      npm run build
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
      npm publish --tag dev
    # Deprecate old dev versions
    - |
      if [ -n "${NPM_DEPRECATE_TOKEN:-$NPM_TOKEN}" ]; then
        echo "//registry.npmjs.org/:_authToken=${NPM_DEPRECATE_TOKEN:-$NPM_TOKEN}" > ~/.npmrc
        node -e '
          const { execSync } = require("child_process");
          
          // 1. Get the full package info (contains deprecation messages)
          const pkgInfo = JSON.parse(execSync("npm view waldur-js-client --json").toString());
          const versions = pkgInfo.versions || [];
          
          // 2. Identify dev versions and figure out which ones *should* be deprecated
          const devVersions = versions.filter(v => v.includes("-dev."));
          const toDeprecate = devVersions.slice(0, -6);
          
          // 3. Map out which versions are already deprecated
          // NPM stores "deprecated" as an object/string mapping versions to messages
          const deprecatedInfo = pkgInfo.deprecated || {};
          
          let deprecationCount = 0;
          for (const v of toDeprecate) {
            // Skip if this specific version already has a deprecation message
            if (deprecatedInfo[v]) {
              continue; 
            }
            
            console.log("Deprecating " + v);
            execSync("npm deprecate waldur-js-client@" + v + " \"Outdated dev version. Use the dev tag for the latest dev release.\"");
            deprecationCount++;
          }
          console.log("Successfully deprecated " + deprecationCount + " new old-dev versions. Kept " + Math.min(devVersions.length, 6) + " recent ones.");
        '
      fi

Publish Release to NPM:
  stage: publish
  image: registry.hpc.ut.ee/mirror/library/node:lts-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "pipeline" && $RELEASE_VERSION =~ /^\d+\.\d+\.\d+$/'
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $RELEASE_VERSION =~ /^\d+\.\d+\.\d+$/'
  needs:
    - job: Build TypeScript SDK
      artifacts: true
  before_script:
    - apk add --no-cache bash git
  script:
    - set -e
    - npm version "$RELEASE_VERSION" --no-git-tag-version
    - npm install
    - npm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - npm publish
